services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: breach_radar
    ports:
      - "5432:5432"
    volumes:
      - breach_radar_pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d breach_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/breach_radar
      HIBP_BREACHES_URL: https://haveibeenpwned.com/api/v3/breaches
      HIBP_USER_AGENT: BreachRadar-Neuroscan-Challenge/1.0
      HIBP_TIMEOUT_SECONDS: 10
      PAGE_SIZE_DEFAULT: 20
      PAGE_SIZE_MAX: 100
      LOG_LEVEL: INFO
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/breach_radar_test
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  breach_radar_pgdata:
